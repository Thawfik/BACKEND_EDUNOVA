# Application
spring.application.name=study-platform
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/studyplatform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Email (OTP verification) — bilingual FR/EN welcome mail sent to the registrant.
# Two delivery paths, tried in this order:
#   1. Resend HTTP API (RESEND_API_KEY) — works everywhere, incl. Render's free
#      tier which blocks outbound SMTP ports (25/465/587). Preferred in prod.
#   2. Gmail SMTP (MAIL_USERNAME + MAIL_PASSWORD) — convenient for local dev.
# With neither configured the OTP code is logged to the console instead of sent.
spring.config.import=optional:classpath:application-local.properties
# Resend transactional email API. `from` must use a Resend-verified domain, or
# the sandbox sender onboarding@resend.dev (which only delivers to your own
# Resend account address) — set MAIL_FROM accordingly in production.
app.mail.resend.api-key=${RESEND_API_KEY:}
app.mail.resend.url=${RESEND_URL:https://api.resend.com/emails}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# From defaults to the authenticated Gmail address so the header isn't rejected/rewritten.
app.mail.from=${MAIL_FROM:EduNova+ <${spring.mail.username:no-reply@edunova.com}>}
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# Storage
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.local.path=${APP_STORAGE_LOCAL_PATH:./uploads}

# AWS S3
app.aws.s3.bucket=${AWS_S3_BUCKET:studyplatform-documents}
app.aws.s3.region=${AWS_REGION:eu-west-1}
app.aws.access-key=${AWS_ACCESS_KEY:}
app.aws.secret-key=${AWS_SECRET_KEY:}

# Claude API
app.claude.api-key=${CLAUDE_API_KEY}
app.claude.model=claude-sonnet-4-6
app.claude.max-tokens=4096

# Code execution (Wandbox public API) — runs CODE_CHALLENGE submissions in a sandbox
app.wandbox.url=${WANDBOX_URL:https://wandbox.org/api}

# Google Drive
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/drive/callback}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.default-produces-media-type=application/json