version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studyplatform-db
    environment:
      POSTGRES_DB: studyplatform
      POSTGRES_USER: studyplatform
      POSTGRES_PASSWORD: studyplatform_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
